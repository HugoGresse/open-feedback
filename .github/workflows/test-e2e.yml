name: Run End to End test using Cypress

on: [push]

jobs:
  cypress-run:
    name: Run End to end test using Cypress
    runs-on: ubuntu-latest
    strategy:
        # when one test fails, DO NOT cancel the other
        # containers, because this will kill Cypress processes
        # leaving Cypress Cloud hanging ...
        # https://github.com/cypress-io/github-action/issues/48
        fail-fast: false
        matrix:
            # run 3 copies of the current job in parallel
            containers: [1, 2, 3]
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
          node-version-file: .nvmrc
          cache: 'npm'

    # The firebase-tools build with nodejs24 support requires JDK 21+ to run
    # the Firestore/Auth emulators.
    - uses: actions/setup-java@v4
      with:
          distribution: temurin
          java-version: '21'

    - uses: 'google-github-actions/auth@v2'
      with:
          credentials_json: '${{ secrets.E2E_GCLOUD_CREDENTIAL_OPEN_FEEDBACK_CYPRESS }}'

    # Functions now read config from process.env (functions/.env*), not the
    # deprecated functions.config()/.runtimeconfig.json. Convert the legacy
    # nested config secret into the dotenv the emulator loads (.env.local).
    - name: "Create functions/.env.local"
      run: |
            echo "$RUNTIME_CONFIG_TEST" | jq -r '
              "APP_ENV=\(.app.env // "test")",
              "APP_URL=\(.app.url // "")",
              "APP_CONTACTEMAIL=\(.app.contactemail // "")",
              "APP_RECAPTCHAV3SECRET=\(.app.recaptchav3secret // "")",
              "MAILGUN_DOMAIN=\(.mailgun.domain // "")",
              "MAILGUN_KEY=\(.mailgun.key // "")",
              "MAILGUN_API=\(.mailgun.api // "")",
              "OPSGENIE_KEY=\(.opsgenie.key // "")",
              "OPSGENIE_API=\(.opsgenie.api // "")"
            ' > functions/.env.local
      shell: bash
      env:
          RUNTIME_CONFIG_TEST: ${{secrets.RUNTIME_CONFIG_TEST}}

    - name: Install functions dependencies
      run: |
            cd functions
            npm ci
            npm run build

    - name: Change .firebaserc file to use open-feedback-cypress project ID
      run: |
                sed -i 's/open-feedback-42/open-feedback-cypress/g' .firebaserc
                cat .firebaserc
#    - name: Create serviceAccount.json
#      run: |
#            echo "$SERVICE_ACCOUNT_JSON" > serviceAccount.json
#      env:
#          SERVICE_ACCOUNT_JSON: ${{ secrets.E2E_GCLOUD_CREDENTIAL_OPEN_FEEDBACK_CYPRESS }}

    - name: Create .env.test.local
      run: |
            echo "VITE_APPID=$CYPRESS_VITE_APPID" > .env.test.local
            echo "VITE_API_KEY=$CYPRESS_VITE_API_KEY" >> .env.test.local
            echo "VITE_AUTH_DOMAIN=$CYPRESS_VITE_AUTH_DOMAIN" >> .env.test.local
            echo "VITE_DATABASE_URL=$CYPRESS_VITE_DATABASE_URL" >> .env.test.local
            echo "VITE_PROJECT_ID=$CYPRESS_VITE_PROJECT_ID" >> .env.test.local
            echo "VITE_STORAGE_BUCKET=$CYPRESS_VITE_STORAGE_BUCKET" >> .env.test.local
            echo "VITE_EMULATORS=true" >> .env.test.local
            cat .env.test.local
      env:
#          GOOGLE_APPLICATION_CREDENTIALS: serviceAccount.json
          VITE_EMULATORS: true
          CYPRESS_VITE_APPID: ${{ secrets.E2E_FIREBASE_APPID }}
          CYPRESS_VITE_API_KEY: ${{ secrets.E2E_FIREBASE_API_KEY }}
          CYPRESS_VITE_AUTH_DOMAIN: ${{ secrets.E2E_FIREBASE_AUTH_DOMAIN }}
          CYPRESS_VITE_DATABASE_URL: ${{ secrets.E2E_FIREBASE_DATABASE_URL }}
          CYPRESS_VITE_PROJECT_ID: ${{ secrets.E2E_FIREBASE_PROJECT_ID }}
          CYPRESS_VITE_STORAGE_BUCKET: ${{ secrets.E2E_FIREBASE_BUCKET }}
          FIREBASE_STORAGE_EMULATOR_HOST: 127.0.0.1:9199

    # The published firebase-tools (<= 15.20.0) rejects the functions nodejs24
    # runtime in the emulator ("Valid versions are 20, 22"). Overlay a build
    # from firebase-tools main (which has nodejs24) so the functions emulator
    # loads. Drop this once a firebase-tools release ships nodejs24 support.
    - name: Install root deps + firebase-tools with nodejs24
      run: |
            npm ci
            npm install --no-save git+https://github.com/firebase/firebase-tools.git#b3be5935533c90c83a128d629e797fcc35b85078
            npx firebase --version

    - name: Run Cypress E2E test
      uses: cypress-io/github-action@v6
      with:
        install: false
        browser: chrome
        build: npm run build
        start: npm run cy:start
        wait-on: 'http://127.0.0.1:3000, http://127.0.0.1:8080, http://127.0.0.1:9099'
        record: true
        parallel: true
      env:
#        GOOGLE_APPLICATION_CREDENTIALS: serviceAccount.json
        VITE_EMULATORS: true
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_DASHBOARD_KEY }}
